<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jaboz Home - Tải ứng dụng</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-start: #667eea;
      --bg-end: #764ba2;
      --card-bg: rgba(255, 255, 255, 0.95);
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --primary: #6366f1;
      --primary-dark: #4f46e5;
    }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      padding: 20px;
      color: var(--text-primary);
    }
    .container { max-width: 980px; margin: 0 auto; }
    header { text-align: center; margin: 24px 0 36px; color: #fff; }
    .logo { font-size: 3rem; font-weight: 800; }
    .logo .brand {
      position: relative;
      display: inline-block;
      z-index: 1;
      text-shadow:
        0 0 14px rgba(214, 236, 255, 0.45),
        0 0 30px rgba(170, 211, 255, 0.25);
      animation: jabozTextGlow 4.6s ease-in-out infinite;
    }
    .logo .brand::before {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
      z-index: -1;
      color: rgba(220, 241, 255, 0.7);
      filter: blur(12px);
      transform: scale(1.08);
      opacity: 0.55;
      animation: jabozGlow 4.6s ease-in-out infinite;
    }
    @keyframes jabozTextGlow {
      0% {
        text-shadow:
          0 0 10px rgba(214, 236, 255, 0.35),
          0 0 22px rgba(170, 211, 255, 0.18);
      }
      50% {
        text-shadow:
          0 0 22px rgba(214, 236, 255, 0.65),
          0 0 48px rgba(170, 211, 255, 0.38);
      }
      100% {
        text-shadow:
          0 0 10px rgba(214, 236, 255, 0.35),
          0 0 22px rgba(170, 211, 255, 0.18);
      }
    }
    @keyframes jabozGlow {
      0% { opacity: 0.38; filter: blur(10px); }
      50% { opacity: 0.9; filter: blur(16px); }
      100% { opacity: 0.38; filter: blur(10px); }
    }
    .logo .home {
      position: relative;
      display: inline-block;
      z-index: 1;
      margin-left: 8px;
      text-shadow:
        0 0 14px rgba(214, 236, 255, 0.45),
        0 0 30px rgba(170, 211, 255, 0.25);
      animation: jabozTextGlow 4.6s ease-in-out infinite;
    }
    .logo .home::before {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
      z-index: -1;
      color: rgba(220, 241, 255, 0.7);
      filter: blur(12px);
      transform: scale(1.08);
      opacity: 0.55;
      animation: jabozGlow 4.6s ease-in-out infinite;
    }
    .subtitle { opacity: 0.9; margin-top: 8px; }
    .card {
      background: var(--card-bg);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
    }
    .section-title {
      font-size: 2rem;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-title::before {
      content: "";
      width: 4px;
      height: 36px;
      border-radius: 2px;
      background: linear-gradient(180deg, var(--primary), #8b5cf6);
    }
    .app-box {
      background: #fff;
      border: 1px solid rgba(99, 102, 241, 0.15);
      border-radius: 14px;
      padding: 20px;
      max-width: 420px;
    }
    .app-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    .meta { color: var(--text-secondary); margin-bottom: 8px; font-size: 0.95rem; }
    .notes {
      font-size: 0.95rem;
      color: var(--text-secondary);
      margin: 10px 0 16px;
      white-space: pre-wrap;
    }
    .download-btn {
      width: 100%;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 12px 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .download-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .status { margin-top: 14px; color: var(--text-secondary); font-size: 0.95rem; }
    footer { text-align: center; color: rgba(255,255,255,.85); margin-top: 30px; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 class="logo"><span class="brand" data-text="Jaboz">Jaboz</span><span class="home" data-text="Home">Home</span></h1>
      <p class="subtitle">Trang tải ứng dụng chính thức</p>
    </header>

    <main class="card">
      <h2 class="section-title">Ứng dụng có sẵn</h2>
      <div class="app-box">
        <div class="app-name">Học Tiếng Việt</div>
        <div class="meta" id="latestVersion">Đang tải phiên bản...</div>
        <div class="notes" id="releaseNotes"></div>
        <button class="download-btn" id="downloadBtn" disabled>Tải APK</button>
        <div class="status" id="statusText">Đang đọc dữ liệu cập nhật...</div>
      </div>
    </main>

    <footer>© 2026 Jaboz Home. Tất cả quyền được bảo lưu.</footer>
  </div>

  <script>
    async function loadUpdateInfo() {
      const statusText = document.getElementById("statusText");
      const latestVersion = document.getElementById("latestVersion");
      const releaseNotes = document.getElementById("releaseNotes");
      const downloadBtn = document.getElementById("downloadBtn");

      try {
        const response = await fetch("./update.json", { cache: "no-store" });
        if (!response.ok) throw new Error("Không đọc được update.json");
        const info = await response.json();

        if (!info.apkUrl || !info.latestVersionCode) {
          throw new Error("update.json thiếu dữ liệu bắt buộc.");
        }

        const name = info.latestVersionName || "N/A";
        latestVersion.textContent = "Phiên bản mới nhất: " + name + " (code " + info.latestVersionCode + ")";
        releaseNotes.textContent = info.releaseNotes || "";
        downloadBtn.disabled = false;
        downloadBtn.onclick = () => {
          window.location.href = info.apkUrl;
        };
        statusText.textContent = "Sẵn sàng tải.";
      } catch (error) {
        statusText.textContent = "Chưa có dữ liệu phát hành hợp lệ.";
        latestVersion.textContent = "Vui lòng cập nhật file update.json";
      }
    }

    loadUpdateInfo();
  </script>
</body>
</html>
