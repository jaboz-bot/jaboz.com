# 1) npx wrangler kv namespace create INSTALL_KV
# 2) Dán id vào dòng "id" bên dưới (và preview_id nếu dùng wrangler dev)
# 3) npx wrangler deploy
# 4) Copy URL *.workers.dev vào gradle.properties dự án app (hoctiengviet.installStatsBaseUrl=...)

name = "hoctiengviet-install-count"
main = "src/index.js"
compatibility_date = "2024-11-01"

[[kv_namespaces]]
binding = "INSTALL_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_PREVIEW_KV_ID"
