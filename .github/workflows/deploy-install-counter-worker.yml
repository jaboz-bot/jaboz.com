# Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID (paste plain ASCII only)

name: Deploy install-counter Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/install-counter/**"
      - ".github/workflows/deploy-install-counter-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check KV id placeholder
        working-directory: workers/install-counter
        run: |
          if grep -q 'REPLACE_' wrangler.toml; then
            echo "::error::wrangler.toml still contains REPLACE_"
            exit 1
          fi

      - name: Validate secrets (ASCII only)
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        working-directory: workers/install-counter
        run: python3 ci-validate-secrets.py

      - name: npm install and wrangler deploy
        working-directory: workers/install-counter
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          TOKEN="$(printf '%s' "$CLOUDFLARE_API_TOKEN" | tr -d '\r\n' | sed 's/[[:space:]]*$//;s/^[[:space:]]*//')"
          ACCOUNT="$(printf '%s' "$CLOUDFLARE_ACCOUNT_ID" | tr -d '\r\n' | sed 's/[[:space:]]*$//;s/^[[:space:]]*//')"
          export CLOUDFLARE_API_TOKEN="$TOKEN"
          export CLOUDFLARE_ACCOUNT_ID="$ACCOUNT"
          npm install
          npx wrangler deploy
