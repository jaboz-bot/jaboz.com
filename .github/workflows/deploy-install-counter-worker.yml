# GitHub Secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# wrangler.toml: thay REPLACE_* bằng id KV từ: npx wrangler kv namespace create INSTALL_KV

name: Deploy install-counter Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/install-counter/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/install-counter
          command: deploy
