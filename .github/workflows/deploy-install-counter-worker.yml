# Cần GitHub Secrets (repo jaboz.com → Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — tạo tại Cloudflare Dashboard → My Profile → API Tokens
#                           (quyền Edit Cloudflare Workers + đọc KV)
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare Dashboard → bên phải cột "Account ID"
#
# wrangler.toml: dòng id = "..." phải là UUID KV thật (không được còn chữ REPLACE_).

name: Deploy install-counter Worker

on:
  push:
    branches: [main]
    paths:
      - "workers/install-counter/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Kiểm tra cấu hình KV
        working-directory: workers/install-counter
        run: |
          if grep -q 'REPLACE_' wrangler.toml; then
            echo "::error::wrangler.toml vẫn chứa REPLACE_ — chưa có KV id thật."
            echo "Trên máy: cd workers/install-counter && npm i && npx wrangler kv namespace create INSTALL_KV"
            echo "Dán id vào wrangler.toml, commit push lại."
            exit 1
          fi

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/install-counter
          command: deploy
