<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#2f365f" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>Jaboz Home - Đồng hồ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at center, #5b6cb1 0%, #2f365f 70%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .clock-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .volume-control {
      position: absolute;
      left: 50%;
      top: -54px;
      transform: translateX(-50%);
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      z-index: 25;
      user-select: none;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 999px;
      padding: 8px 14px;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.2);
    }
    .volume-label {
      color: #334155;
      font-size: 13px;
      font-weight: 600;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.45);
    }
    .volume-slider {
      width: min(42vw, 320px);
      min-width: 220px;
      height: 16px;
      cursor: pointer;
      accent-color: #f59e0b;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #f97316;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }
    .volume-slider::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #f97316;
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }
    .clock {
      width: min(82vmin, 92vw);
      height: min(82vmin, 92vw);
      border-radius: 50%;
      border: 1.2vmin solid rgba(223, 232, 255, 0.9);
      background: radial-gradient(circle at center, #ffffff 0%, #e9efff 74%);
      position: relative;
      box-shadow: inset 0 0.8vmin 2vmin rgba(0, 0, 0, 0.1), 0 3vmin 7vmin rgba(0, 0, 0, 0.35);
    }
    .marker {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 0.9vmin;
      height: 36vmin;
      transform-origin: 50% 100%;
      margin-left: -0.45vmin;
      margin-top: -36vmin;
      background: linear-gradient(to bottom, #475569 0 3.4vmin, transparent 3.4vmin);
    }
    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      border-radius: 1vmin;
    }
    .hour {
      width: 1.8vmin;
      height: 21vmin;
      margin-left: -0.9vmin;
      background: #0f172a;
    }
    .minute {
      width: 1.2vmin;
      height: 29vmin;
      margin-left: -0.6vmin;
      background: #334155;
    }
    .second {
      width: 0.5vmin;
      height: 33vmin;
      margin-left: -0.25vmin;
      background: #ef4444;
    }
    .dot {
      width: 2.8vmin;
      height: 2.8vmin;
      border-radius: 50%;
      background: #0f172a;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
    .settings-btn {
      margin-top: 18px;
      width: 172px;
      height: 48px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #f59e0b, #f97316);
      color: #ffffff;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 14px 24px rgba(249, 115, 22, 0.35);
      z-index: 20;
      transition: opacity 240ms ease, transform 200ms ease, filter 200ms ease;
    }
    .settings-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }
    .settings-btn.faded { opacity: 0.22; }
    .bottom-controls {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      justify-content: center;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 15, 33, 0.56);
      backdrop-filter: blur(4px);
      z-index: 60;
      display: none;
    }
    .overlay.open { display: block; }
    .modal {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(460px, calc(100vw - 24px));
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      border: 1px solid #dbeafe;
      border-radius: 18px;
      box-shadow: 0 28px 52px rgba(15, 23, 42, 0.35);
      z-index: 70;
      padding: 16px;
      display: none;
    }
    .modal.open { display: block; }
    .password-modal { width: min(360px, calc(100vw - 24px)); }
    .settings-panel.open { display: block; }
    .settings-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #0f172a;
    }
    .time-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 220px;
      overflow: auto;
      margin-bottom: 10px;
    }
    .time-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .time-row input {
      flex: 1;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
    }
    .password-input {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 15px;
      margin: 10px 0 12px;
    }
    .remove-btn {
      border: none;
      background: #fee2e2;
      color: #b91c1c;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      cursor: pointer;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .btn-row button {
      border: none;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-add { background: #dbeafe; color: #1d4ed8; }
    .btn-save { background: #dcfce7; color: #166534; }
    .btn-stop { background: #fee2e2; color: #b91c1c; }
    .btn-close { background: #e2e8f0; color: #334155; }
    .btn-install { background: #ede9fe; color: #5b21b6; }
    .panel-status {
      margin-top: 8px;
      color: #475569;
      font-size: 13px;
      min-height: 18px;
    }
    .clock-number {
      position: absolute;
      color: #0f172a;
      font-weight: 700;
      font-size: 7vmin;
      z-index: 8;
      user-select: none;
    }
    .num-12 { top: 2.2%; left: 50%; transform: translateX(-50%); }
    .num-3 { right: 2.2%; top: 50%; transform: translateY(-50%); }
    .num-6 { bottom: 2.2%; left: 50%; transform: translateX(-50%); }
    .num-9 { left: 2.2%; top: 50%; transform: translateY(-50%); }
    @media (max-width: 900px) {
      .clock-number { font-size: 8.5vmin; }
      .volume-control {
        top: -46px;
        padding: 7px 12px;
      }
      .volume-slider {
        min-width: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="clock-wrap">
    <div class="clock" aria-label="Đồng hồ kim toàn màn hình">
      <div class="marker" style="transform: rotate(30deg)"></div>
      <div class="marker" style="transform: rotate(60deg)"></div>
      <div class="marker" style="transform: rotate(120deg)"></div>
      <div class="marker" style="transform: rotate(150deg)"></div>
      <div class="marker" style="transform: rotate(210deg)"></div>
      <div class="marker" style="transform: rotate(240deg)"></div>
      <div class="marker" style="transform: rotate(300deg)"></div>
      <div class="marker" style="transform: rotate(330deg)"></div>
      <div class="clock-number num-12">12</div>
      <div class="clock-number num-3">3</div>
      <div class="clock-number num-6">6</div>
      <div class="clock-number num-9">9</div>
      <div class="hand hour" id="hour"></div>
      <div class="hand minute" id="minute"></div>
      <div class="hand second" id="second"></div>
      <div class="dot"></div>
    </div>
    <div class="volume-control" aria-label="Âm lượng chuông báo">
      <div class="volume-label">Âm lượng</div>
      <input class="volume-slider" id="volumeSlider" type="range" min="0" max="100" value="80" />
    </div>
  </div>

  <div class="bottom-controls">
    <button class="settings-btn" id="settingsBtn" type="button" aria-label="Mở cài đặt">Cài Đặt</button>
  </div>
  <div class="overlay" id="overlay"></div>
  <div class="modal password-modal" id="passwordModal">
    <div class="settings-title">Nhập mật khẩu</div>
    <input class="password-input" id="passwordInput" type="password" placeholder="Mật khẩu cài đặt" />
    <div class="btn-row">
      <button class="btn-save" id="passwordOkBtn" type="button">Xác nhận</button>
      <button class="btn-close" id="passwordCancelBtn" type="button">Hủy</button>
    </div>
    <div class="panel-status" id="passwordStatus"></div>
  </div>
  <div class="modal settings-panel" id="settingsPanel">
    <div class="settings-title">Cài đặt báo thức</div>
    <div class="time-list" id="timeList"></div>
    <div class="btn-row">
      <button class="btn-add" id="addTimeBtn" type="button">+ Thêm giờ</button>
      <button class="btn-save" id="saveTimesBtn" type="button">Lưu</button>
      <button class="btn-install" id="installAppBtn" type="button">Tạo shortcut app</button>
      <button class="btn-stop" id="stopAlarmBtn" type="button">Tắt chuông</button>
      <button class="btn-close" id="closePanelBtn" type="button">Đóng</button>
    </div>
    <div class="panel-status" id="panelStatus"></div>
  </div>

  <script>
    const hourHand = document.getElementById("hour");
    const minuteHand = document.getElementById("minute");
    const secondHand = document.getElementById("second");
    const settingsBtn = document.getElementById("settingsBtn");
    const volumeSlider = document.getElementById("volumeSlider");
    const overlay = document.getElementById("overlay");
    const passwordModal = document.getElementById("passwordModal");
    const passwordInput = document.getElementById("passwordInput");
    const passwordOkBtn = document.getElementById("passwordOkBtn");
    const passwordCancelBtn = document.getElementById("passwordCancelBtn");
    const passwordStatus = document.getElementById("passwordStatus");
    const settingsPanel = document.getElementById("settingsPanel");
    const timeList = document.getElementById("timeList");
    const addTimeBtn = document.getElementById("addTimeBtn");
    const saveTimesBtn = document.getElementById("saveTimesBtn");
    const installAppBtn = document.getElementById("installAppBtn");
    const stopAlarmBtn = document.getElementById("stopAlarmBtn");
    const closePanelBtn = document.getElementById("closePanelBtn");
    const panelStatus = document.getElementById("panelStatus");
    const alarmAudio = new Audio("./nhac_chuong.mp3");
    const hourlyAudio = new Audio("./1_hour.mp3");
    alarmAudio.loop = false;
    alarmAudio.preload = "auto";
    hourlyAudio.loop = false;
    hourlyAudio.preload = "auto";
    const PASSCODE = "2007";
    const STORAGE_KEY = "jabozAlarmTimes";
    const SHARED_TIMES_URL = "./alarm-times.json";
    const DEFAULT_TIMES = ["10:00", "12:00", "15:00"];
    const GITHUB_OWNER = "jaboz-bot";
    const GITHUB_REPO = "jaboz.com";
    const GITHUB_BRANCH = "main";
    const GITHUB_FILE_PATH = "alarm-times.json";
    const VOLUME_KEY = "jabozAlarmVolume";
    const GITHUB_TOKEN_KEY = "jabozGithubToken";
    const PENDING_SYNC_KEY = "jabozPendingSync";
    const TEMP_UI_KEY = "jabozTempUiState";
    let alarmTimes = [];
    let lastTriggeredStamp = "";
    let lastHourlyStamp = "";
    let deferredInstallPrompt = null;
    let fadeTimer = null;
    let syncDebounceTimer = null;

    function updateClock() {
      const now = new Date();
      const sec = now.getSeconds();
      const min = now.getMinutes() + sec / 60;
      const hour = (now.getHours() % 12) + min / 60;
      hourHand.style.transform = "rotate(" + (hour * 30) + "deg)";
      minuteHand.style.transform = "rotate(" + (min * 6) + "deg)";
      secondHand.style.transform = "rotate(" + (sec * 6) + "deg)";
    }

    setInterval(updateClock, 1000);
    updateClock();

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function currentMinuteKey(date) {
      return pad2(date.getHours()) + ":" + pad2(date.getMinutes());
    }

    function checkAlarmTimes() {
      if (!alarmTimes.length) return;
      const now = new Date();
      const key = currentMinuteKey(now);
      const stamp = now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate() + " " + key;
      if (alarmTimes.includes(key) && lastTriggeredStamp !== stamp) {
        lastTriggeredStamp = stamp;
        alarmAudio.currentTime = 0;
        alarmAudio.play().catch(() => {});
      }
      if (now.getMinutes() === 0 && now.getSeconds() < 2) {
        const hourStamp = now.getFullYear() + "-" + (now.getMonth() + 1) + "-" + now.getDate() + " " + pad2(now.getHours());
        if (lastHourlyStamp !== hourStamp) {
          lastHourlyStamp = hourStamp;
          hourlyAudio.currentTime = 0;
          hourlyAudio.volume = alarmAudio.volume;
          hourlyAudio.play().catch(() => {});
        }
      }
    }
    function showOverlay() {
      overlay.classList.add("open");
    }

    function hideOverlay() {
      overlay.classList.remove("open");
    }

    function showPasswordModal() {
      showOverlay();
      passwordStatus.textContent = "";
      passwordInput.value = "";
      passwordModal.classList.add("open");
      passwordInput.focus();
    }

    function hidePasswordModal() {
      passwordModal.classList.remove("open");
      hideOverlay();
    }

    function showSettingsModal() {
      showOverlay();
      settingsPanel.classList.add("open");
    }

    function hideSettingsModal() {
      settingsPanel.classList.remove("open");
      hideOverlay();
    }

    function scheduleButtonFade() {
      settingsBtn.classList.remove("faded");
      if (fadeTimer) clearTimeout(fadeTimer);
      fadeTimer = setTimeout(() => {
        settingsBtn.classList.add("faded");
      }, 5000);
    }


    function createTimeRow(value) {
      const row = document.createElement("div");
      row.className = "time-row";
      const input = document.createElement("input");
      input.type = "time";
      input.value = value || "";
      const remove = document.createElement("button");
      remove.className = "remove-btn";
      remove.type = "button";
      remove.textContent = "x";
      remove.addEventListener("click", () => {
        row.remove();
      });
      row.appendChild(input);
      row.appendChild(remove);
      timeList.appendChild(row);
    }

    async function loadSharedConfig() {
      try {
        const response = await fetch(SHARED_TIMES_URL, { cache: "no-store" });
        if (!response.ok) throw new Error("Cannot fetch shared times");
        const data = await response.json();
        const sharedTimes = Array.isArray(data.times)
          ? Array.from(new Set(data.times.filter((item) => typeof item === "string" && item.includes(":")))).sort()
          : [];
        const sharedVolume = typeof data.volume === "number"
          ? Math.max(0, Math.min(1, data.volume))
          : null;
        if (sharedTimes.length || sharedVolume !== null) {
          return { times: sharedTimes, volume: sharedVolume };
        }
      } catch (error) {
        // Fallback to local/default when shared file is unavailable.
      }
      return null;
    }

    function getGithubToken() {
      const existing = localStorage.getItem(GITHUB_TOKEN_KEY);
      if (existing) return existing;
      const token = window.prompt("Nhập GitHub token 1 lần (quyền repo) để tự động đồng bộ:");
      if (!token) {
        panelStatus.textContent = "Chưa có token nên chưa thể tự đồng bộ GitHub.";
        return null;
      }
      localStorage.setItem(GITHUB_TOKEN_KEY, token);
      return token;
    }

    async function syncTimesToGithub(silent) {
      const token = getGithubToken();
      if (!token) return;
      try {
        const apiUrl = "https://api.github.com/repos/" + GITHUB_OWNER + "/" + GITHUB_REPO + "/contents/" + GITHUB_FILE_PATH;
        const readResp = await fetch(apiUrl, {
          headers: {
            Authorization: "Bearer " + token,
            Accept: "application/vnd.github+json"
          }
        });
        if (!readResp.ok) throw new Error("Không đọc được alarm-times.json trên GitHub.");
        const readData = await readResp.json();
        const payload = JSON.stringify({ times: alarmTimes, volume: alarmAudio.volume }, null, 2);
        const encoded = btoa(unescape(encodeURIComponent(payload)));
        const writeResp = await fetch(apiUrl, {
          method: "PUT",
          headers: {
            Authorization: "Bearer " + token,
            Accept: "application/vnd.github+json",
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: "Update shared alarm times from web",
            content: encoded,
            sha: readData.sha,
            branch: GITHUB_BRANCH
          })
        });
        if (!writeResp.ok) throw new Error("Đồng bộ thất bại. Kiểm tra token hoặc quyền repo.");
        localStorage.removeItem(PENDING_SYNC_KEY);
        if (!silent) {
          panelStatus.textContent = "Đã đồng bộ mốc giờ + âm lượng lên GitHub.";
        }
      } catch (error) {
        const message = error.message || "Không thể đồng bộ lên GitHub.";
        panelStatus.textContent = message;
        // Token có thể hết hạn/sai, xóa để lần sau nhập lại.
        localStorage.removeItem(GITHUB_TOKEN_KEY);
        markPendingSync();
      }
    }

    function scheduleAutoSync() {
      if (syncDebounceTimer) clearTimeout(syncDebounceTimer);
      syncDebounceTimer = setTimeout(() => {
        syncTimesToGithub(true);
      }, 1200);
    }

    function markPendingSync() {
      localStorage.setItem(PENDING_SYNC_KEY, "1");
    }

    async function loadSavedTimes() {
      const shared = await loadSharedConfig();
      if (shared && shared.times.length) {
        alarmTimes = shared.times;
      } else {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : [];
          alarmTimes = Array.isArray(parsed) && parsed.length ? parsed.filter(Boolean) : DEFAULT_TIMES.slice();
        } catch (error) {
          alarmTimes = DEFAULT_TIMES.slice();
        }
      }
      if (shared && shared.volume !== null) {
        alarmAudio.volume = shared.volume;
        volumeSlider.value = String(Math.round(shared.volume * 100));
        localStorage.setItem(VOLUME_KEY, String(shared.volume));
      }
      timeList.innerHTML = "";
      if (!alarmTimes.length) createTimeRow("");
      alarmTimes.forEach((time) => createTimeRow(time));
    }

    function saveTimes() {
      const inputs = Array.from(timeList.querySelectorAll("input[type='time']"));
      const values = inputs.map((it) => it.value).filter(Boolean);
      const uniqueSorted = Array.from(new Set(values)).sort();
      alarmTimes = uniqueSorted;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(uniqueSorted));
      panelStatus.textContent = uniqueSorted.length
        ? "Đã lưu " + uniqueSorted.length + " mốc báo thức (máy hiện tại)."
        : "Chưa có giờ nào được lưu.";
      markPendingSync();
      scheduleAutoSync();
    }

    window.setInterval(checkAlarmTimes, 1000);
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      installAppBtn.disabled = false;
      panelStatus.textContent = "Sẵn sàng cài shortcut app.";
    });
    window.addEventListener("appinstalled", () => {
      deferredInstallPrompt = null;
      installAppBtn.disabled = true;
      panelStatus.textContent = "Đã cài app ra màn hình.";
    });

    settingsBtn.addEventListener("click", showPasswordModal);
    passwordCancelBtn.addEventListener("click", hidePasswordModal);
    passwordOkBtn.addEventListener("click", async () => {
      if (passwordInput.value !== PASSCODE) {
        passwordStatus.textContent = "Sai mật khẩu. Vui lòng thử lại.";
        return;
      }
      hidePasswordModal();
      await loadSavedTimes();
      showSettingsModal();
      panelStatus.textContent = "Nhập giờ rồi bấm Lưu.";
    });
    passwordInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        passwordOkBtn.click();
      }
    });

    addTimeBtn.addEventListener("click", () => {
      createTimeRow("");
    });

    saveTimesBtn.addEventListener("click", saveTimes);
    installAppBtn.addEventListener("click", async () => {
      if (!deferredInstallPrompt) {
        panelStatus.textContent = "Trình duyệt chưa hỗ trợ nút cài. Hãy dùng menu trình duyệt > Cài đặt ứng dụng.";
        return;
      }
      deferredInstallPrompt.prompt();
      const choice = await deferredInstallPrompt.userChoice;
      panelStatus.textContent = choice.outcome === "accepted"
        ? "Bạn đã đồng ý cài app."
        : "Bạn đã hủy cài app.";
      deferredInstallPrompt = null;
      installAppBtn.disabled = true;
    });
    closePanelBtn.addEventListener("click", hideSettingsModal);
    stopAlarmBtn.addEventListener("click", () => {
      alarmAudio.pause();
      alarmAudio.currentTime = 0;
      panelStatus.textContent = "Đã tắt chuông.";
    });
    installAppBtn.disabled = true;
    const savedVolume = Number(localStorage.getItem(VOLUME_KEY));
    const initialVolume = Number.isFinite(savedVolume) ? Math.max(0, Math.min(1, savedVolume)) : 0.8;
    alarmAudio.volume = initialVolume;
    volumeSlider.value = String(Math.round(initialVolume * 100));
    volumeSlider.addEventListener("input", () => {
      const value = Number(volumeSlider.value) / 100;
      alarmAudio.volume = value;
      hourlyAudio.volume = value;
      localStorage.setItem(VOLUME_KEY, String(value));
      markPendingSync();
      scheduleAutoSync();
    });
    loadSavedTimes().then(() => {
      panelStatus.textContent = "Mốc mặc định: 10:00, 12:00, 15:00.";
    });
    if (localStorage.getItem(PENDING_SYNC_KEY) === "1") {
      syncTimesToGithub(true);
    }
    ["pointerdown", "keydown", "mousemove", "touchstart"].forEach((evt) => {
      window.addEventListener(evt, scheduleButtonFade, { passive: true });
    });
    window.addEventListener("beforeunload", () => {
      sessionStorage.clear();
      localStorage.removeItem(TEMP_UI_KEY);
      alarmAudio.pause();
      hourlyAudio.pause();
    });
    scheduleButtonFade();
