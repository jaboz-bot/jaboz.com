<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Jaboz Home - Đồng hồ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at center, #5b6cb1 0%, #2f365f 70%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .clock {
      width: min(82vmin, 92vw);
      height: min(82vmin, 92vw);
      border-radius: 50%;
      border: 1.2vmin solid rgba(223, 232, 255, 0.9);
      background: radial-gradient(circle at center, #ffffff 0%, #e9efff 74%);
      position: relative;
      box-shadow: inset 0 0.8vmin 2vmin rgba(0, 0, 0, 0.1), 0 3vmin 7vmin rgba(0, 0, 0, 0.35);
    }
    .marker {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 0.9vmin;
      height: 36vmin;
      transform-origin: 50% 100%;
      margin-left: -0.45vmin;
      margin-top: -36vmin;
      background: linear-gradient(to bottom, #475569 0 3.4vmin, transparent 3.4vmin);
    }
    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      border-radius: 1vmin;
    }
    .hour {
      width: 1.8vmin;
      height: 21vmin;
      margin-left: -0.9vmin;
      background: #0f172a;
    }
    .minute {
      width: 1.2vmin;
      height: 29vmin;
      margin-left: -0.6vmin;
      background: #334155;
    }
    .second {
      width: 0.5vmin;
      height: 33vmin;
      margin-left: -0.25vmin;
      background: #ef4444;
    }
    .dot {
      width: 2.8vmin;
      height: 2.8vmin;
      border-radius: 50%;
      background: #0f172a;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="clock" aria-label="Đồng hồ kim toàn màn hình">
    <div class="marker" style="transform: rotate(0deg)"></div>
    <div class="marker" style="transform: rotate(30deg)"></div>
    <div class="marker" style="transform: rotate(60deg)"></div>
    <div class="marker" style="transform: rotate(90deg)"></div>
    <div class="marker" style="transform: rotate(120deg)"></div>
    <div class="marker" style="transform: rotate(150deg)"></div>
    <div class="marker" style="transform: rotate(180deg)"></div>
    <div class="marker" style="transform: rotate(210deg)"></div>
    <div class="marker" style="transform: rotate(240deg)"></div>
    <div class="marker" style="transform: rotate(270deg)"></div>
    <div class="marker" style="transform: rotate(300deg)"></div>
    <div class="marker" style="transform: rotate(330deg)"></div>
    <div class="hand hour" id="hour"></div>
    <div class="hand minute" id="minute"></div>
    <div class="hand second" id="second"></div>
    <div class="dot"></div>
  </div>

  <script>
    const hourHand = document.getElementById("hour");
    const minuteHand = document.getElementById("minute");
    const secondHand = document.getElementById("second");

    function updateClock() {
      const now = new Date();
      const sec = now.getSeconds();
      const min = now.getMinutes() + sec / 60;
      const hour = (now.getHours() % 12) + min / 60;
      hourHand.style.transform = "rotate(" + (hour * 30) + "deg)";
      minuteHand.style.transform = "rotate(" + (min * 6) + "deg)";
      secondHand.style.transform = "rotate(" + (sec * 6) + "deg)";
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
